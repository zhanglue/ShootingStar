apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: recommendation-engine
  name: retriever-user-cf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retriever-user-cf
  template:
    metadata:
      labels:
        app: retriever-user-cf
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: retriever-user-cf
        image: 192.168.1.101:55000/recommendation-engine-retriever-user-cf:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        ports:
        - containerPort: 50211
          name: grpc
---
apiVersion: v1
kind: Service
metadata:
  namespace: recommendation-engine
  name: retriever-user-cf
spec:
  type: LoadBalancer
  ports:
  - port: 50211
  selector:
    app: retriever-user-cf
