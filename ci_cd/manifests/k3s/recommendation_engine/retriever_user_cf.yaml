apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: recommendation-engine
  name: retriever-user-cf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retriever-user-cf
  template:
    metadata:
      labels:
        app: retriever-user-cf
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: retriever-user-cf
        image: 192.168.1.101:55000/recommendation-engine-retriever-user-cf:latest
        imagePullPolicy: Always
        args:
        - --config_path=config.k8s.yaml
        - --host
        - 0.0.0.0
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              # Kubernetes Secrets are namespace-scoped. Mirror this secret
              # from recommendation-engine-redis into recommendation-engine
              # before applying the Deployment.
              name: redis-auth
              key: password
        ports:
        - containerPort: 50220
          name: grpc
---
apiVersion: v1
kind: Service
metadata:
  namespace: recommendation-engine
  name: retriever-user-cf
spec:
  type: LoadBalancer
  ports:
  - port: 50220
  selector:
    app: retriever-user-cf
