apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: recommendation-engine
  name: profile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile
  template:
    metadata:
      labels:
        app: profile
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: profile
        image: 192.168.1.101:55000/recommendation-engine-profile:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        env:
        - name: ES_PASSWORD
          valueFrom:
            secretKeyRef:
              # Kubernetes Secrets are namespace-scoped. Mirror this ECK secret
              # from recommendation-engine-es into recommendation-engine before
              # applying the Deployment.
              name: item-index-es-elastic-user
              key: elastic
        ports:
        - containerPort: 50100
          name: grpc
        volumeMounts:
        - name: elasticsearch-ca
          mountPath: /mnt/elasticsearch-ca
          readOnly: true
      volumes:
      - name: elasticsearch-ca
        secret:
          # Mirror this ECK public CA secret from recommendation-engine-es into
          # recommendation-engine before applying the Deployment.
          secretName: item-index-es-http-certs-public
---
apiVersion: v1
kind: Service
metadata:
  namespace: recommendation-engine
  name: profile
spec:
  type: LoadBalancer
  ports:
  - port: 50100
  selector:
    app: profile
