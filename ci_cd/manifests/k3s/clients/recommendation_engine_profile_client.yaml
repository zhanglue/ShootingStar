apiVersion: batch/v1
kind: Job
metadata:
  name: recommendation-engine-profile-client
  namespace: recommendation-engine
spec:
  template:
    metadata:
      labels:
        app: recommendation-engine-profile-client
    spec:
      restartPolicy: Never
      containers:
      - name: recommendation-engine-profile-client
        image: 192.168.1.101:55000/recommendation-engine-profile-client:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        args:
        - --ip
        - profile.recommendation-engine.svc.cluster.local
        - --port
        - "50100"
