apiVersion: batch/v1
kind: Job
metadata:
  name: recommendation-engine-retriever-client
  namespace: recommendation-engine
spec:
  template:
    metadata:
      labels:
        app: recommendation-engine-retriever-client
    spec:
      restartPolicy: Never
      containers:
      - name: recommendation-engine-retriever-client
        image: recommendation-engine-retriever-client:latest
        imagePullPolicy: Never
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        args:
        - --ip
        - retriever-item-cf.recommendation-engine.svc.cluster.local
        - --port
        - "50210"
