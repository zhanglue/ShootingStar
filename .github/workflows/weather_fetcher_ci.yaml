name: Weather Fetcher CI
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  K8S_NAMESPACE: weather-fetcher-pr-${{ github.run_number }}
  COMPILE_BASE_IMG_NAME: shootingstar.azurecr.io/shooting-star-base
  COMPILE_BASE_IMG_TAG: compile-base-cached
  WEATHER_FETCHER_IMG_NAME: shootingstar.azurecr.io/weather-fetcher
  WEATHER_FETCHER_IMG_TAG: pr-${{ github.run_number }}
  WEATHER_FETCHER_CLI_IMG_NAME: shootingstar.azurecr.io/weather-fetcher-client
  WEATHER_FETCHER_CLI_IMG_TAG: pr-${{ github.run_number }}
jobs:
  build_and_deploy_weather_fetcher:
    name: build & deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the source code.
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry.
      uses: Azure/docker-login@v2
      with:
         login-server: shootingstar.azurecr.io
         username: ${{ secrets.ACR_USERNAME }}
         password: ${{ secrets.ACR_PASSWORD }}

    - name: Compile the source code of WeatherFetcher.
      run: |
        ./tools/compile_in_docker.sh \
          --base-image-name ${COMPILE_BASE_IMG_NAME} \
          --base-image-tag ${COMPILE_BASE_IMG_TAG} \
          //src/weather_fetcher:weather_fetcher

    - name: Build the image of WeatherFetcher.
      run: |
        docker build . \
          --file ./ci_cd/docker_files/weather_fetcher \
          --tag ${WEATHER_FETCHER_IMG_NAME}:${WEATHER_FETCHER_IMG_TAG}

    - name: Push the image to Azure Container Registry.
      run: docker push ${WEATHER_FETCHER_IMG_NAME}:${WEATHER_FETCHER_IMG_TAG}

    - name: Login as ShootingStarSP.
      uses: Azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up kubectl.
      uses: Azure/setup-kubectl@v4
      with:
        version: v1.30.2

    - name: Set up Kubernetes context.
      uses: Azure/aks-set-context@v4
      with:
         resource-group: ShootingStarRG
         cluster-name: ShootingStarK8s

    - name: Create Kubernetes namespace for current PR.
      run: kubectl create namespace ${K8S_NAMESPACE}

    - name: Create Kubernetes secret.
      uses: Azure/k8s-create-secret@v5
      with:
         secret-name: k8s-shootingstar-secret
         namespace: ${{ env.K8S_NAMESPACE }}
         container-registry-url: shootingstar.azurecr.io
         container-registry-username: ${{ secrets.ACR_USERNAME }}
         container-registry-password: ${{ secrets.ACR_PASSWORD }}

    - name: Prepare Kubernetes manifest for WeatherFetcher.
      run: |
        find ci_cd/manifests/azure_ci/ -name "*.yaml" -exec \
          sed -i "s/__PLACE_HOLDER_FOR_PR_NUMBER__/${{ github.run_number }}/g" {} \;

    - name: Deploy WeaterFetcher to Kubernetes.
      uses: Azure/k8s-deploy@v5
      with:
         action: deploy
         strategy: basic
         namespace: ${{ env.K8S_NAMESPACE }}
         manifests: ci_cd/manifests/azure_ci/weather_fetcher.yaml
         images: ${{ env.WEATHER_FETCHER_IMG_NAME }}:${{ env.WEATHER_FETCHER_IMG_TAG }}
         imagepullsecrets: k8s-shootingstar-secret

  test_weather_fetcher_with_grpc_client:
    name: test by K8S job
    runs-on: ubuntu-latest
    needs: build_and_deploy_weather_fetcher
    steps:
    - name: Checkout the source code.
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry.
      uses: Azure/docker-login@v2
      with:
         login-server: shootingstar.azurecr.io
         username: ${{ secrets.ACR_USERNAME }}
         password: ${{ secrets.ACR_PASSWORD }}

    - name: Compile the source code of WeatherFetcher client.
      run: |
        ./tools/compile_in_docker.sh \
          --base-image-name ${COMPILE_BASE_IMG_NAME} \
          --base-image-tag ${COMPILE_BASE_IMG_TAG} \
          //src/clients:weather_fetcher_client

    - name: Build the image of WeatherFetcher client.
      run: |
        docker build . \
          --file ./ci_cd/docker_files/weather_fetcher_client \
          --tag ${WEATHER_FETCHER_CLI_IMG_NAME}:${WEATHER_FETCHER_CLI_IMG_TAG}

    - name: Push the image to Azure Container Registry.
      run: docker push ${WEATHER_FETCHER_CLI_IMG_NAME}:${WEATHER_FETCHER_CLI_IMG_TAG}

    - name: Login as ShootingStarSP.
      uses: Azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up kubectl.
      uses: Azure/setup-kubectl@v4
      with:
        version: v1.30.2

    - name: Set up Kubernetes context.
      uses: Azure/aks-set-context@v4
      with:
         resource-group: ShootingStarRG
         cluster-name: ShootingStarK8s

    - name: Create Kubernetes secret.
      uses: Azure/k8s-create-secret@v5
      with:
         secret-name: k8s-shootingstar-secret
         namespace: ${{ env.K8S_NAMESPACE }}
         container-registry-url: shootingstar.azurecr.io
         container-registry-username: ${{ secrets.ACR_USERNAME }}
         container-registry-password: ${{ secrets.ACR_PASSWORD }}

    - name: Prepare Kubernetes manifest for WeatherFetcher client.
      run: |
        find ci_cd/manifests/azure_ci/ -name "*.yaml" -exec \
          sed -i "s/__PLACE_HOLDER_FOR_PR_NUMBER__/${{ github.run_number }}/g" {} \;

    - name: Create Kubernetes job of WeatherFetcher client.
      uses: Azure/k8s-deploy@v5
      with:
         action: deploy
         strategy: basic
         namespace: ${{ env.K8S_NAMESPACE }}
         manifests: ci_cd/manifests/azure_ci/weather_fetcher_client.yaml
         images: ${{ env.WEATHER_FETCHER_CLI_IMG_NAME }}:${{ env.WEATHER_FETCHER_CLI_IMG_TAG }}
         imagepullsecrets: k8s-shootingstar-secret

    - name: Test by Kubernetes job of GrpcClientDemo.
      run: |
        ./tools/download_pod_logs.sh "${{ env.K8S_NAMESPACE }}" 'weather-fetcher-client'
        condition=$(cat weather-fetcher-client.log | grep 'condition')
        [[ $condition == 'condition: SNOWY' ]] || exit 1
        temperature=$(cat weather-fetcher-client.log | grep 'temperature')
        [[ $temperature == '22' ]] || exit 2
        echo "!!!PASSED!!!"
