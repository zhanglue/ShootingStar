apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: shooting-star
  name: weather-fetcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-fetcher
  template:
    metadata:
      labels:
        app: weather-fetcher
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: weather-fetcher
        image: weather-fetcher:latest
        resources:
          requests:
            memory: 256Mi
            cpu: "0.2"
          limits:
            memory: 512Mi
            cpu: "1"
        ports:
        - containerPort: 5000
          name: grpc
---
apiVersion: v1
kind: Service
metadata:
  namespace: shooting-star
  name: weather-fetcher
spec:
  type: LoadBalancer
  ports:
  - port: 5000
  selector:
    app: weather-fetcher
