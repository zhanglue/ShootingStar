syntax = "proto3";

package shooting_star.recommendation_engine;

import "protos/recommendation_engine/retrieval.proto";

service Gateway {
  rpc Recommend (RecommendRequest) returns (RecommendResponse);
}

message RecommendRequest {
  string trace_id = 1;
  string request_id = 2;
  int32 user_id = 3;
  int32 max_results = 4;
}

message RecommendResponse {
  RecommendationStatus status = 1;
  string msg = 2;
  repeated CandidateItem candidates = 3;
}

enum RecommendationStatus {
  SUCCESS = 0;
  INVALID_REQUEST = 1;
  USER_NOT_FOUND = 2;
  SYSTEM_ERROR = 3;
}
