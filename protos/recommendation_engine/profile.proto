syntax = "proto3";

package shooting_star.recommendation_engine;

service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  rpc BatchGetUserCfProfiles (BatchGetUserCfProfilesRequest)
      returns (BatchGetUserCfProfilesResponse);
}

////////////////////////////////////////////////////////////////////////////////
// Request/response for general user profile.
////////////////////////////////////////////////////////////////////////////////

message GetProfileRequest {
  string trace_id = 1;
  string request_id = 3;
  int32 user_id = 2;
}

message GetProfileResponse {
  ProfileServiceStatus status = 1;
  GetProfileRequest request = 2;
  Profile profile = 3;
}

enum ProfileServiceStatus {
  PROFILE_SUCCESS = 0;
  PROFILE_INVALID_REQUEST = 1;
  PROFILE_USER_NOT_FOUND = 2;
  PROFILE_SYSTEM_ERROR = 3;
}

message Profile {
  int64 user_id = 1;
  Demographics demographics = 2;
  SocialInfo social = 3;
  Interests interests = 4;
  NegativeFeedback negative_feedbacks = 5;
  Behaviors behaviors = 6;
  repeated EmbeddingSet embedding_sets = 7;
  ProfileStats stats = 8;
}

message Demographics {
  string username = 1;
  string display_name = 2;
  int32 birth_year = 3;
  string gender = 4;
  int32 location_id = 5;
}

message SocialInfo {
  repeated int64 following = 1;
  repeated int64 followers = 2;
}

message Interests {
  repeated GenreInterest genres = 1;
  repeated TagInterest tags = 2;
}

message NegativeFeedback {
  repeated WeightedItem items = 1;
  repeated GenreInterest genres = 2;
  repeated TagInterest tags = 3;
}

message Behaviors {
  repeated WeightedItem liked_items = 1;
  repeated WeightedItem recent_liked_items = 2;
  repeated WeightedItem interested_items = 3;
  repeated int64 rated_items = 4;
}

message EmbeddingSet {
  string embedding_id = 1;
  string description = 2;
  repeated float vector = 3;
  bool active = 4;
}

message ProfileStats {
  int32 rating_count = 1;
  int32 positive_rating_count = 2;
  int32 weak_positive_rating_count = 3;
  int32 negative_rating_count = 4;
  float avg_rating = 5;
  // Population standard deviation of the user's ratings.
  float rating_stddev = 6;
  int64 first_event_time = 7;
  int64 last_event_time = 8;
  int64 active_timeframe = 9;
  float profile_confidence = 10;
  float interest_entropy = 11;
}

message GenreInterest {
  string genre = 1;
  float weight = 2;
  float confidence = 3;
  int64 update_time = 4;
}

message TagInterest {
  string tag = 1;
  float weight = 2;
  float confidence = 3;
  int64 update_time = 4;
}

message WeightedItem {
  int64 item_id = 1;
  float weight = 2;
  int64 event_time = 3;
  WeightedItemSource source = 4;
  float confidence = 5;
  float raw_score = 6;
}

enum WeightedItemSource {
  WEIGHTED_ITEM_SOURCE_UNSPECIFIED = 0;
  WEIGHTED_ITEM_SOURCE_RATING = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Batch request/response for user collaborative filtering profiles.
////////////////////////////////////////////////////////////////////////////////

message BatchGetUserCfProfilesRequest {
  string trace_id = 1;
  string request_id = 3;
  repeated int64 user_ids = 2;
}

message UserCfProfile {
  int64 user_id = 1;
  repeated WeightedItem recent_liked_items = 2;
  repeated WeightedItem liked_items = 3;
  repeated WeightedItem interested_items = 4;
}

message UserCfProfileResult {
  ProfileServiceStatus status = 1;
  int64 user_id = 2;
  UserCfProfile profile = 3;
}

message BatchGetUserCfProfilesResponse {
  ProfileServiceStatus status = 1;
  BatchGetUserCfProfilesRequest request = 2;
  repeated UserCfProfileResult results = 3;
}
