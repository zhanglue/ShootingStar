syntax = "proto3";

package shooting_star.recommendation_engine;

import "protos/recommendation_engine/profile.proto";
import "protos/recommendation_engine/retrieval.proto";

service RetrieverService {
  rpc Retrieve (RetrieverRequest) returns (RetrieverResponse);
}

message RetrieverRequest {
  string trace_id = 1;
  string request_id = 2;
  int64 user_id = 3;
  Profile profile = 4;
  int32 max_candidate_count = 5;
}

message RetrieverResponse {
  RetrieverServiceStatus status = 1;
  RetrieverRequest request = 2;
  int32 candidate_count = 3;
  repeated CandidateItem candidates = 4;
}

enum RetrieverServiceStatus {
  RETRIEVER_SUCCESS = 0;
  RETRIEVER_INVALID_REQUEST = 1;
  RETRIEVER_USER_NOT_FOUND = 2;
  RETRIEVER_SYSTEM_ERROR = 3;
  RETRIEVER_EMPTY_TRIGGER_SEEDS = 4;
}
