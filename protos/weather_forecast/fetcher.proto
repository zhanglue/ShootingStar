syntax = "proto3";

package shooting_star.weather_flow;

import "protos/weather_forecast/weather_data.proto";

service Fetcher {
  rpc GetWeather (GetWeatherRequest) returns (GetWeatherResponse);
}

message GetWeatherRequest {
  string city = 1;
}

message GetWeatherResponse {
  WeatherServiceStatus status = 1;
  string msg = 2;
  WeatherData data = 3;
}

enum WeatherServiceStatus {
  WEATHER_SUCCESS = 0;
  WEATHER_CITY_NOT_FOUND = 1;
  WEATHER_SYSTEM_ERROR = 2;
}
