server:
  port: 50100
  log_level: INFO

store_type: elasticsearch

elasticsearch:
  base_url: https://item-index-es-http.recommendation-engine-es.svc:9200
  index: movielens_32m_user_profile
  username: elastic
  password: ""
  password_env: ES_PASSWORD
  request_timeout_ms: 5000
  http_client:
    curl_handle_pool:
      pool_size: 4
      acquire_timeout_ms: 1000
    request_timeout_ms: 5000
    connect_timeout_ms: 1000
    follow_redirects: true
    verify_ssl: true
    ca_cert_path: /mnt/elasticsearch-ca/ca.crt

local_cache:
  capacity: 30
  ttl_seconds: 300
