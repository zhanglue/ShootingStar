server:
  port: 50220
  log_level: INFO

retriever_user_cf:
  trigger_seed_user_count: 10
  score_multiplier: 8.0

profile_service:
  host: profile.recommendation-engine.svc.cluster.local
  port: 50100

redis:
  host: redis-write.recommendation-engine-redis.svc.cluster.local
  port: 6379
  db: 0
  username: ""
  password: ""
  password_env: REDIS_PASSWORD
  key_prefix: rec:user_cf:v1:neighbors
  connect_timeout_ms: 1000
  socket_timeout_ms: 1000
  pool_size: 4
  pool_wait_timeout_ms: 100
  retry:
    max_attempts: 2
    delay_ms: 10
