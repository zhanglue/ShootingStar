server:
  host: 127.0.0.1
  port: 50210
  log_level: DEBUG

retriever_item_cf:
  score_multiplier: 0.8

similarity_store:
  type: local
  data_path: tests/testdata/recommendation_engine/local_recommendation_fixture/item_similarity.jsonl

redis:
  host: localhost
  port: 6379
  db: 0
  username: ""
  password: ""
  password_env: REDIS_PASSWORD
  key_prefix: rec:item_cf:v1:neighbors
  connect_timeout_ms: 100
  socket_timeout_ms: 100
  pool_size: 4
  pool_wait_timeout_ms: 50
  retry:
    max_attempts: 2
    delay_ms: 10
